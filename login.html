<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>HD™ Secure Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        :root {
            --primary-green: #71a35a;
            --light-green: #a2e08e;
            --input-border: rgba(255, 255, 255, 0.4);
            --text-main: #ffffff;
            --vh: 1vh;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
            background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), 
                        url('register.png') center/cover fixed;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            font-size: 12px;
            padding: 16px;
        }

        /* Login Container */
        .login-container {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
           /* margin-bottom: 32px;*/
        }

        .logo-image {
            width: 80px;
            height: 80px;
            margin-bottom: 12px;
            object-fit: contain;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--text-main);
            display: none;
        }

        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }

        .secure-header {
            font-size: 10px;
            color: var(--light-green);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .main-title {
            font-weight: 300;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        .login-description {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Welcome Message */
        .welcome-message {
            text-align: center;
            margin-bottom: 24px;
            display: none;
        }

        .welcome-message h3 {
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 6px;
        }

        .welcome-message p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* Form Elements */
        .form-group {
            width: 100%;
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 10px;
            margin-bottom: 4px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 12px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--input-border);
            color: white;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            border-bottom-color: white;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-size: 12px;
        }

        /* Remember Me */
        .remember-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 16px 0 24px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
        }

        .checkbox-label input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-green);
            cursor: pointer;
        }

        .forgot-link {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:active {
            color: var(--light-green);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--primary-green);
            color: white;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Security Footer */
        .security-footer {
            margin-top: 32px;
            text-align: center;
        }

        .security-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.35);
            margin-bottom: 12px;
        }

        .security-note .material-symbols-outlined {
            font-size: 12px;
        }

        .footer-note {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            line-height: 1.4;
        }

        .footer-note a {
            color: var(--light-green);
            text-decoration: none;
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .hidden {
            display: none !important;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media screen and (max-width: 768px) {
            input, button {
                font-size: 14px !important;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <!-- Logo Section -->
    <div class="logo-section">
        <img src="assets/HD.png" alt="HD Logo" class="logo-image" onerror="this.style.display='none'">
        <div class="brand-name">HD-Forge™</div>
    </div>

    <header class="login-header">
        <div class="secure-header">Secure Access</div>
        <h1 class="main-title">Login</h1>
        <div class="login-description">Enter your credentials to continue</div>
    </header>

    <div class="welcome-message">
        <h3>HD-Forge Member Access</h3>
        <p>Please sign in with your registered phone number</p>
    </div>

    <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-input" id="phone" placeholder="+255 XXX XXX XXX" autocomplete="tel">
    </div>

    <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <div class="remember-row">
        <label class="checkbox-label">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link" onclick="alert('Please contact your agent for password reset.')">Forgot password?</a>
    </div>

    <button class="btn" onclick="login()">Sign In</button>

    <div class="security-footer">
        <div class="security-note">
            <span class="material-symbols-outlined">lock</span>
            <span>Your connection is encrypted with 256-bit SSL</span>
        </div>
        <p class="footer-note">
            Protected by HD-Forge™ Security<br>
            <a href="#">Privacy Policy</a> · <a href="#">Terms of Service</a>
        </p>
    </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-spinner"></div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCEizB96hxzlvnKd3CbDabqeYu7RrKDbYM",
    authDomain: "newagefarmbase.firebaseapp.com",
    projectId: "newagefarmbase"
};

const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
const db = getFirestore(app);

const loadingOverlay = document.getElementById('loadingOverlay');

// Fix viewport height
function setVH() {
    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
}
setVH();
window.addEventListener('resize', setVH);

function showLoading() { loadingOverlay.classList.remove('hidden'); }
function hideLoading() { loadingOverlay.classList.add('hidden'); }

/* Apply Theme */
function applyTheme(mode) {
    if(mode === "light") {
        document.documentElement.style.setProperty("--text-main", "#000000");
        document.body.style.background = "linear-gradient(rgba(255, 255, 255, 0.85), rgba(255, 255, 255, 0.85)), url('register.png') center/cover fixed";
    } else {
        document.documentElement.style.setProperty("--text-main", "#ffffff");
        document.body.style.background = "linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), url('register.png') center/cover fixed";
    }
}

/* Login Function */
window.login = async () => {
    const phone = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;
    const remember = document.getElementById("remember").checked;

    if(!phone || !password) {
        alert("Please fill in all fields");
        return;
    }

    showLoading();

    try {
        const q = query(
            collection(db, "users"),
            where("phone", "==", phone),
            where("password", "==", password)
        );

        const snap = await getDocs(q);

        if (snap.empty) {
            hideLoading();
            alert("Invalid phone number or password");
            return;
        }

        const userDoc = snap.docs[0].data();
        const docId = snap.docs[0].id;

        // Save session (2 days)
        localStorage.setItem("naf_session", JSON.stringify({
            uid: docId,
            docId,
            phone: userDoc.phone,
            language: userDoc.language,
            theme: userDoc.theme,
            expires: Date.now() + 172800000
        }));

        // Remember login
        if(remember) {
            localStorage.setItem("naf_remember", JSON.stringify({ phone, password }));
        } else {
            localStorage.removeItem("naf_remember");
        }

        applyTheme(userDoc.theme);
        
        hideLoading();
        location.href = "more.html";

    } catch (e) {
        hideLoading();
        console.error('Login error:', e);
        alert("Login failed. Please try again.");
    }
};

// Check for existing session
const session = JSON.parse(localStorage.getItem("naf_session") || "null");
if(session && session.expires > Date.now()) {
    applyTheme(session.theme);
    location.href = "logout.html";
}

// Load remembered login
const remembered = JSON.parse(localStorage.getItem("naf_remember") || "null");
if(remembered) {
    document.getElementById("phone").value = remembered.phone;
    document.getElementById("password").value = remembered.password;
    document.getElementById("remember").checked = true;
}
</script>

</body>
</html>
